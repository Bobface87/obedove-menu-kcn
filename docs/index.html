<!DOCTYPE html>
<html lang="sk">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Obedové menu KC Nitra</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍽️ Obedové menu KC Nitra</h1>

<div id="current-date"></div>

<div id="app">Načítavam...</div>


<script>

function showCurrentDate() {

	const now = new Date();

	const days = [
		"Nedeľa",
		"Pondelok",
		"Utorok",
		"Streda",
		"Štvrtok",
		"Piatok",
		"Sobota"
	];


	const months = [
		"januára",
		"februára",
		"marca",
		"apríla",
		"mája",
		"júna",
		"júla",
		"augusta",
		"septembra",
		"októbra",
		"novembra",
		"decembra"
	];


	const text =
		`${days[now.getDay()]} ${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`;


	document.getElementById(
		"current-date"
	).innerHTML = "📅 Menu na deň: " + text;

}


showCurrentDate();

</script>


<script src="script.js"></script>

</body>
</html>
