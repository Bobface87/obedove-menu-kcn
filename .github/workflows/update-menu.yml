name: Update menu

on:
  schedule:
    - cron: "0 * * * 1-5"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber

      - name: Run menu builder
        run: |
          python scraper/build_menu.py

      - name: Commit changes
        run: |
          if [ ! -f .menu_updated ]; then
            echo "Aktualizácia bola preskočená."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/menu.json

          if git diff --cached --quiet; then
            echo "Žiadne zmeny."
            exit 0
          fi

          git commit -m "auto update menu"
          git push